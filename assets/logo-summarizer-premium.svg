<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Summarizer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8A3C"/>
      <stop offset="1" stop-color="#F05A28"/>
    </linearGradient>
  </defs>

  <!-- premium solid rounded square -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- summarize: many lines condensing into one -->
  <g stroke="#FFFFFF" stroke-linecap="round">
    <line x1="150" y1="168" x2="362" y2="168" stroke-width="22"/>
    <line x1="150" y1="224" x2="320" y2="224" stroke-width="22" opacity="0.8"/>
    <line x1="150" y1="280" x2="278" y2="280" stroke-width="22" opacity="0.6"/>
    <line x1="150" y1="344" x2="236" y2="344" stroke-width="30"/>
  </g>
</svg>
