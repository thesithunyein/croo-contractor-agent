<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Solana TX Doctor logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15102A"/>
      <stop offset="1" stop-color="#070611"/>
    </linearGradient>
    <linearGradient id="sol" x1="150" y1="160" x2="362" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9945FF"/>
      <stop offset="0.5" stop-color="#7B5BFF"/>
      <stop offset="1" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="solBar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14F195"/>
      <stop offset="1" stop-color="#9945FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9945FF" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#9945FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="#241A3D" stroke-width="2"/>
  <circle cx="256" cy="256" r="190" fill="url(#glow)"/>

  <!-- pulse / diagnosis line (ECG) across the middle -->
  <path d="M96 256 H176 l22 -58 28 116 26 -150 26 150 22 -58 H416"
        fill="none" stroke="url(#solBar)" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- medical cross (diagnosis), rounded -->
  <g opacity="0.18">
    <rect x="226" y="120" width="60" height="272" rx="22" fill="#FFFFFF"/>
    <rect x="120" y="226" width="272" height="60" rx="22" fill="#FFFFFF"/>
  </g>

  <!-- Solana signature: three diagonal bars (badge top-right) -->
  <g transform="translate(300,300)">
    <path d="M14 6 H92 l-22 22 H-8 Z" fill="url(#solBar)"/>
    <path d="M-8 40 H70 l22 22 H14 Z" fill="url(#solBar)"/>
    <path d="M14 74 H92 l-22 22 H-8 Z" fill="url(#solBar)"/>
  </g>

  <!-- central node -->
  <circle cx="256" cy="256" r="30" fill="url(#sol)"/>
  <circle cx="256" cy="256" r="30" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
</svg>
