<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Solana TX Doctor logo v2">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16112B"/>
      <stop offset="1" stop-color="#070611"/>
    </linearGradient>
    <linearGradient id="sol" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14F195"/>
      <stop offset="1" stop-color="#9945FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#9945FF" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#9945FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="#241A3D" stroke-width="2"/>
  <circle cx="256" cy="240" r="190" fill="url(#glow)"/>

  <!-- transaction block being inspected -->
  <g transform="translate(150,150)">
    <rect x="0" y="0" width="180" height="180" rx="28" fill="#0E0A1E" stroke="#2E2350" stroke-width="3"/>
    <!-- tx rows -->
    <rect x="28" y="40" width="124" height="14" rx="7" fill="#3A2E63"/>
    <rect x="28" y="74" width="96"  height="14" rx="7" fill="#3A2E63"/>
    <rect x="28" y="108" width="124" height="14" rx="7" fill="#3A2E63"/>
    <!-- the failing row highlighted -->
    <rect x="28" y="74" width="96"  height="14" rx="7" fill="url(#sol)"/>
  </g>

  <!-- magnifying glass (diagnosis) -->
  <g>
    <circle cx="232" cy="226" r="84" fill="none" stroke="url(#sol)" stroke-width="22"/>
    <circle cx="232" cy="226" r="84" fill="#9945FF" fill-opacity="0.06"/>
    <line x1="296" y1="296" x2="372" y2="372" stroke="url(#sol)" stroke-width="30" stroke-linecap="round"/>
    <!-- check / heartbeat inside the lens -->
    <path d="M196 230 l24 28 44 -64" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
