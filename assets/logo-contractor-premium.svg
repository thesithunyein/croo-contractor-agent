<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CROO Contractor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D26A"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
  </defs>

  <!-- premium solid rounded square -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- hub-and-spoke: orchestrator connecting agents -->
  <g stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" opacity="0.95">
    <line x1="256" y1="256" x2="160" y2="160"/>
    <line x1="256" y1="256" x2="352" y2="160"/>
    <line x1="256" y1="256" x2="256" y2="372"/>
  </g>

  <!-- satellite nodes -->
  <g fill="#FFFFFF">
    <circle cx="160" cy="160" r="30"/>
    <circle cx="352" cy="160" r="30"/>
    <circle cx="256" cy="372" r="30"/>
  </g>

  <!-- central hub -->
  <circle cx="256" cy="256" r="46" fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="20" fill="#16A34A"/>
</svg>
